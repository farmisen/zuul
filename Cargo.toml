[package]
name = "zuul"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "CLI tool for managing secrets across multiple environments, backed by pluggable cloud secret managers"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
toml = "0.8"
